# ============================================================================
# Work in Germany — Configuration
# ============================================================================
# Scrapes Greenhouse & Lever public APIs, filters for Germany-based jobs.
# Each company entry: name, url, type (greenhouse|lever), company_type, visa
# ============================================================================

settings:
  max_age_days: 60
  update_interval: "every 6 hours"

# Germany location signals (case-insensitive)
germany_signals:
  cities:
    - Berlin
    - Munich
    - München
    - Hamburg
    - Frankfurt
    - Stuttgart
    - Cologne
    - Köln
    - Düsseldorf
    - Dusseldorf
    - Leipzig
    - Dresden
    - Nuremberg
    - Nürnberg
    - Hannover
    - Hanover
    - Bonn
    - Mannheim
    - Karlsruhe
    - Aachen
    - Heidelberg
    - Darmstadt
    - Paderborn
    - Bielefeld
    - Dortmund
    - Essen
    - Freiburg
    - Erlangen
    - Wolfsburg
    - Walldorf
    - Göppingen
    - Regensburg
    - Ingolstadt
    - Potsdam
    - Sindelfingen
    - Gütersloh
    - Espelkamp
    - Lippstadt
    - Augsburg
    - Jena
    - Garching
    - Herzogenaurach
  regions:
    - Germany
    - Deutschland
    - DACH
    - "DE"
  remote_signals:
    - "Remote - Germany"
    - "Remote Germany"
    - "Remote, Germany"
    - "Remote - DE"
    - "Remote - DACH"
    - "Remote - EMEA"
    - "Remote EMEA"
    - "Remote - Europe"
    - "Remote Europe"
    - "EMEA"

# Normalize city names for display
location_normalize:
  "München": "Munich"
  "Köln": "Cologne"
  "Nürnberg": "Nuremberg"
  "Hannover": "Hanover"
  "Frankfurt am Main": "Frankfurt"

