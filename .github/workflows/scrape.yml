name: Update Jobs

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:       # Manual trigger
  push:
    paths:
      - 'config.yml'
      - 'scripts/**'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper (all sources)
        run: python scripts/scraper.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Check for changes
        id: changes
        run: git diff --quiet data/ README.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          TOTAL=$(python -c "import json; print(json.load(open('data/stats.json'))['total_jobs'])")
          git add data/ README.md
          git commit -m "chore: update jobs [${TOTAL} listings]"
          # Retry loop: pull latest & push, in case another run pushed first
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
